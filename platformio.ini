; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:atmega328p_custom]
platform = atmelavr
board = uno
framework = arduino

upload_protocol = arduino
upload_speed = 115200
monitor_speed = 115200

; Set CPU frequency to 16MHz
board_build.f_cpu = 16000000L

; If you want to upload via ICSP instead of serial:
; upload_protocol = usbasp
; upload_flags = -Pusb

build_flags =
    -I./hal
    -I./app
    -I./drivers
    -I./config
    -DLOG_COMPILE_LEVEL=LOG_DEBUG
    -DLOG_DEFAULT_LEVEL=LOG_DEBUG
build_src_filter = +<*> +<../app/*> +<../drivers/*> +<../hal/*> +<../config/*> -<../drivers/solenoid_core.cpp> -<../drivers/solenoid_pair.cpp>

[env:atmega328pb_custom]
platform = atmelavr
board = ATmega328PB
framework = arduino

; Upload through MiniCore bootloader via USB-UART
;upload_protocol = arduino
upload_protocol = urclock
upload_speed = 115200
monitor_speed = 115200

; Your custom board is Uno-like: 16 MHz external clock
board_build.f_cpu = 16000000L

build_flags =
    -I./hal
    -I./app
    -I./drivers
    -I./config
    -DLOG_COMPILE_LEVEL=LOG_INFO
    -DLOG_DEFAULT_LEVEL=LOG_INFO
    -DATMEGA328PB_CUSTOM

build_src_filter = +<*> +<../app/*> +<../drivers/*> +<../hal/*> +<../config/*> -<../drivers/solenoid_core.cpp> -<../drivers/solenoid_pair.cpp>